<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sélection de paiement</title>
    <style>
        /* Styles de base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-image: url('https://i.pinimg.com/564x/ce/ec/c7/ceecc723c04697e0e6fd83d8710dc0db.jpg'); /* Image de fond */
            background-size: cover; /* L'image couvre toute la page */
            background-repeat: no-repeat; /* Ne répète pas l'image */
            background-position: center center; /* Centrer l'image */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9); /* Fond blanc avec un peu de transparence */
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .payment-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .payment-option {
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }

        .payment-option:hover {
            background-color: #007bff;
            color: white;
        }

        /* Couleurs spécifiques */
        .orange { background-color: #ffa500; }
        .tmoney { background-color: #ffcc00; }
        .moov { background-color: #008000; }
        .wave { background-color: #00bfff; }
        .airtel { background-color: #e30613; }

    </style>
</head>
<body>
    <div class="container">
        <h1>Sélectionnez votre mode de paiement</h1>
        <div class="payment-options">
            <div class="payment-option orange" onclick="redirectToPage('orange')">Orange Money</div>
            <div class="payment-option tmoney" onclick="redirectToPage('tmoney')">TMoney</div>
            <div class="payment-option moov" onclick="redirectToPage('moov')">Moov Money</div>
            <div class="payment-option wave" onclick="redirectToPage('wave')">Wave Money</div>
            <div class="payment-option airtel" onclick="redirectToPage('airtel')">Airtel Money</div>
        </div>
    </div>

    <script>
        function redirectToPage(paymentMethod) {
            // Redirige vers la page correspondante selon le réseau choisi
            const url = `./${paymentMethod}.html`; // Redirection vers le fichier HTML correspondant
            window.location.href = url;
        }
    </script>
</body>
</html>
